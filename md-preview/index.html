<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Preview</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <p class="eyebrow">Markdown Preview</p>
        <h1>업로드하면 바로 보이는 미리보기</h1>
        <p class="description">좌측에서 수정하고 우측에서 바로 확인하시면 됩니다.</p>
      </div>
      <label class="upload-button" for="markdown-file">.md 업로드</label>
      <input id="markdown-file" type="file" accept=".md,text/markdown" hidden />
    </header>

    <p id="file-name" class="file-name">sample.md 없이도 바로 작성 가능합니다.</p>

    <main class="split-view">
      <section class="panel">
        <div class="panel-header">Markdown</div>
        <textarea id="markdown-input" spellcheck="false"># 안녕하세요

여기에 markdown을 붙여 넣거나 `.md` 파일을 업로드하세요.

- 좌측은 원문
- 우측은 프리뷰
- GitHub Pages 배포용 정적 페이지

> 가볍고 빠르게 확인하는 용도입니다.

```js
console.log('preview ready');
```</textarea>
      </section>

      <section class="panel">
        <div class="panel-header">Preview</div>
        <article id="markdown-preview" class="preview"></article>
      </section>
    </main>
  </div>
</body>
</html>
